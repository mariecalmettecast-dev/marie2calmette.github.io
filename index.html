<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marie Calmette - Artiste</title>

<style>
body {
  margin:0;
  font-family: 'Helvetica Neue', Arial;
  background:#fff;
  color:#111;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid #eee;
}

header h1 {
  font-weight:300;
  letter-spacing:2px;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:#111;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h2 {
  font-weight:300;
}

/* GALERIE */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
  padding:20px 40px;
}

.art {
  position:relative;
  cursor:pointer;
}

.art img {
  width:100%;
  height:350px;
  object-fit:cover;
}

.art:hover img {
  opacity:0.85;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img {
  max-width:80%;
  max-height:70%;
}

.modal .info {
  color:#fff;
  margin-top:15px;
  text-align:center;
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:#fff;
  cursor:pointer;
}

/* CONTACT */
.contact {
  padding:60px 20px;
  text-align:center;
  border-top:1px solid #eee;
}

footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>Marie Calmette</h1>
  <nav>
    <a href="#gallery">Œuvres</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Artiste peintre</h2>
  <p>Exploration des formes, des textures et de l’émotion</p>
</section>

<section id="gallery" class="gallery">

  <div class="art" onclick="openModal(this)">
    <img src="https://via.placeholder.com/800">
    <div class="data" 
         data-title="Titre œuvre 1"
         data-year="2024"
         data-tech="Acrylique sur toile"
         data-size="80 x 60 cm">
    </div>
  </div>

  <div class="art" onclick="openModal(this)">
    <img src="https://via.placeholder.com/800">
    <div class="data" 
         data-title="Titre œuvre 2"
         data-year="2023"
         data-tech="Technique mixte"
         data-size="100 x 80 cm">
    </div>
  </div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">×</span>
  <img id="modalImg">
  <div class="info" id="modalInfo"></div>
</div>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Email : tonemail@email.com</p>
  <p>Instagram : @toncompte</p>
</section>

<footer>
  © 2026 Marie Calmette
</footer>

<script>
function openModal(element) {
  const img = element.querySelector("img").src;
  const data = element.querySelector(".data");

  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = img;

  document.getElementById("modalInfo").innerHTML =
    "<h3>" + data.dataset.title + "</h3>" +
    "<p>" + data.dataset.year + "</p>" +
    "<p>" + data.dataset.tech + "</p>" +
    "<p>" + data.dataset.size + "</p>";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Marie Calmette - Artiste</title>

<style>
body {margin:0;font-family:Arial;background:#fff;color:#111;}

header {
  padding:20px 40px;
  border-bottom:1px solid #eee;
}

/* CATÉGORIES */
.categories {
  text-align:center;
  padding:20px;
}

.categories button {
  margin:5px;
  padding:10px;
  border:none;
  background:#eee;
  cursor:pointer;
}

.categories button.active {
  background:#111;
  color:#fff;
}

/* CARROUSEL */
.carousel {
  display:none;
  position:relative;
  padding:20px;
}

.carousel.active {
  display:block;
}

.track {
  display:flex;
  overflow-x:auto;
  gap:10px;
  scroll-behavior:smooth;
}

.track::-webkit-scrollbar {
  display:none;
}

.art {
  min-width:150px;
  cursor:pointer;
}

.art img {
  width:150px;
  height:150px;
  object-fit:cover;
}

/* BOUTONS */
.arrow {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#000;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}

.left {left:10px;}
.right {right:10px;}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img {
  max-width:80%;
  max-height:70%;
}

.modal .info {
  color:#fff;
  text-align:center;
  margin-top:10px;
}

.close {
  position:absolute;
  top:20px;
  right:30px;
  color:#fff;
  font-size:30px;
  cursor:pointer;
}

footer {
  text-align:center;
  padding:40px;
  border-top:1px solid #eee;
}
</style>
</head>

<body>

<header>
  <h1>Marie Calmette</h1>
</header>

<!-- CATÉGORIES -->
<div class="categories">
  <button onclick="showCat('c1')" class="active">Catégorie 1</button>
  <button onclick="showCat('c2')">Catégorie 2</button>
  <button onclick="showCat('c3')">Catégorie 3</button>
  <button onclick="showCat('c4')">Catégorie 4</button>
  <button onclick="showCat('c5')">Catégorie 5</button>
  <button onclick="showCat('c6')">Catégorie 6</button>
  <button onclick="showCat('c7')">Catégorie 7</button>
</div>

<!-- === CARROUSEL MODÈLE === -->
<div id="c1" class="carousel active">
<button class="arrow left" onclick="scrollCarousel(this,-300)">‹</button>

<div class="track">

<!-- OEUVRE -->
<div class="art" onclick="openModal(this)">
<img src="">
<div class="data"
data-title="Titre"
data-year=""
data-tech=""
data-size=""
data-desc="">
</div>
</div>

</div>

<button class="arrow right" onclick="scrollCarousel(this,300)">›</button>
</div>

<!-- AUTRES CATÉGORIES -->
<div id="c2" class="carousel"></div>
<div id="c3" class="carousel"></div>
<div id="c4" class="carousel"></div>
<div id="c5" class="carousel"></div>
<div id="c6" class="carousel"></div>
<div id="c7" class="carousel"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<span class="close" onclick="closeModal()">×</span>
<img id="modalImg">
<div class="info" id="modalInfo"></div>
</div>

<!-- CONTACT -->
<footer>
<h2>Contact / Achat</h2>
<p>Email : tonemail@email.com</p>
</footer>

<script>
function showCat(id){
  document.querySelectorAll('.carousel').forEach(c=>c.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.categories button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function scrollCarousel(btn, distance){
  const track = btn.parentElement.querySelector('.track');
  track.scrollLeft += distance;
}

function openModal(el){
  const img = el.querySelector("img").src;
  const d = el.querySelector(".data");

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=img;

  document.getElementById("modalInfo").innerHTML =
    "<h3>"+d.dataset.title+"</h3>"+
    "<p>"+d.dataset.year+"</p>"+
    "<p>"+d.dataset.tech+"</p>"+
    "<p>"+d.dataset.size+"</p>"+
    "<p>"+d.dataset.desc+"</p>";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
